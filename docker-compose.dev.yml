version: "3.8"

services:
  paintress-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://paintress_user:paintress_password@postgres:5432/paintress_db
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    env_file:
      - paintress-server/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./paintress-server:/app
      - ./paintress-web-app/dist:/app/static
    restart: unless-stopped
    networks:
      - paintress-network
    command: ["python", "main.py"]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=paintress_db
      - POSTGRES_USER=paintress_user
      - POSTGRES_PASSWORD=paintress_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./paintress-server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paintress_user -d paintress_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - paintress-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@paintress.local
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - paintress-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  paintress-network:
    driver: bridge
